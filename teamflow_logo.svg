<div style={{display:"flex",alignItems:"center",gap:0}}>
  {/* Flow lines icon */}
  <div style={{display:"flex",flexDirection:"column",gap:5,paddingTop:2,position:"relative",width:34,height:34}}>
    <div style={{height:2,width:22,background:sc,borderRadius:2,boxShadow:`0 0 6px ${sc}`}}/>
    <div style={{height:2,width:16,marginLeft:4,background:sc,borderRadius:2,opacity:0.6}}/>
    <div style={{height:2,width:10,marginLeft:8,background:sc,borderRadius:2,opacity:0.3}}/>
    <svg style={{position:"absolute",right:0,top:"50%",transform:"translateY(-50%)",width:10,height:22}} viewBox="0 0 10 22" fill="none">
      <polyline points="1,1 9,11 1,21" stroke={sc} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  </div>
  <div style={{width:1,height:30,background:`rgba(${scr},0.2)`,margin:"0 12px"}}/>
  <div>
    <div style={{fontFamily:"'Orbitron',monospace",fontSize:16,fontWeight:900,letterSpacing:2,background:`linear-gradient(90deg,${sc},#00ddff)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TEAM<span style={{opacity:0.4,fontWeight:400,WebkitTextFillColor:sc}}>FLOW</span></div>
    <div style={{fontSize:7,color:`rgba(${scr},0.4)`,letterSpacing:3,marginTop:2}}>DBMS PRACTICUM 2026</div>
